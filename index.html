// Color scale based on sunny days
function getSunColor(sunny) {
  if (sunny >= 250) return '#8b6914';
  if (sunny >= 215) return '#c49a42';
  if (sunny >= 205) return '#a88a4a';
  return '#8a7d5e';
}

function getMarkerSize(sunny) {
  return Math.max(12, Math.min(22, (sunny - 170) * 0.12 + 12));
}

function makeStars(n) {
  const full = Math.floor(n);
  const half = n % 1 >= 0.5;
  return '<span style="color:#b8864a">' + '★'.repeat(full) + (half ? '½' : '') + '</span><span style="opacity:0.2;color:#9e9486">' + '★'.repeat(5 - full - (half ? 1 : 0)) + '</span>';
}

function barColor(pct) {
  if (pct >= 70) return '#6aab72';
  if (pct >= 50) return '#b8864a';
  return '#c47a3e';
}

function makePopup(c) {
  let noteHtml = '';
  if (c.note) {
    const cls = c.note.startsWith('⚠️') ? 'warning' : 'highlight';
    noteHtml = `<div class="popup-note ${cls}">${c.note}</div>`;
  }

  return `
    <div class="popup-inner">
      <div class="popup-tag">${c.tag}</div>
      <div class="popup-city">${c.name}</div>
      <div class="popup-state">${c.state}</div>
      <img class="popup-photo" src="${c.photo}" alt="${c.name}" onerror="this.style.display='none'" />
      <div class="popup-vibe">${c.vibe}</div>
      <div class="popup-grid">
        <div class="popup-stat">
          <div class="popup-stat-label">☀️ Sunny Days</div>
          <div class="popup-stat-value">${c.sunny}/yr</div>
        </div>
        <div class="popup-stat">
          <div class="popup-stat-label">🌡️ Winter</div>
          <div class="popup-stat-value">${c.winter}°F avg</div>
        </div>
        <div class="popup-stat">
          <div class="popup-stat-label">🏠 Median Home</div>
          <div class="popup-stat-value">${c.home}</div>
        </div>
        <div class="popup-stat">
          <div class="popup-stat-label">🚶 Walk Score</div>
          <div class="popup-stat-value">${c.walkScore || '—'}<span style="font-size:11px;color:#9e9486">/100</span></div>
        </div>
        <div class="popup-stat" style="grid-column: 1 / -1">
          <div class="popup-stat-label">✈️ Airport</div>
          <div class="popup-stat-value" style="font-size:11px">${c.airport}</div>
        </div>
      </div>
      <div class="popup-stat" style="margin-bottom:14px">
        <div class="popup-stat-label">🌊 Water</div>
        <div class="popup-stat-value" style="font-size:13px;font-weight:400">${c.water}</div>
      </div>
      <div class="popup-section-label">Ratings</div>
      <div class="popup-bar-row">
        <span class="popup-bar-label">Walkability</span>
        <div class="popup-bar-track"><div class="popup-bar-fill" style="width:${c.walkScore || 0}%;background:${barColor(c.walkScore || 0)}"></div></div>
      </div>
      <div style="font-size:11px;color:#9e9486;margin:-2px 0 8px 98px">${c.walkLabel || ''}</div>
      <div class="popup-bar-row">
        <span class="popup-bar-label">Safety</span>
        <div class="popup-bar-track"><div class="popup-bar-fill" style="width:${c.safety.pct}%;background:${barColor(c.safety.pct)}"></div></div>
      </div>
      <div style="font-size:11px;color:#9e9486;margin:-2px 0 8px 98px">${c.safety.label}</div>
      <div class="popup-bar-row">
        <span class="popup-bar-label">Transit</span>
        <div style="font-size:13px">${makeStars(c.transit.stars)}</div>
      </div>
      <div style="font-size:11px;color:#9e9486;margin:-2px 0 8px 98px">${c.transit.label}</div>
      <div class="popup-bar-row">
        <span class="popup-bar-label">Architecture</span>
        <div style="font-size:13px">${makeStars(c.architecture.stars)}</div>
      </div>
      <div style="font-size:11px;color:#9e9486;margin:-2px 0 8px 98px">${c.architecture.label}</div>
      <div class="popup-section-title">🚂 Getting Out — Transit & Metro Access</div>
      ${(c.transitRoutes || []).map(r => `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px;">
          <span style="font-size:14px;flex-shrink:0">${r.mode}</span>
          <span style="color:#3d3529;font-weight:500">${r.to}</span>
          <span style="color:#9e9486;margin-left:auto;flex-shrink:0">${r.time}</span>
        </div>
        ${r.note ? `<div style="font-size:10px;color:#9e9486;margin:-2px 0 4px 26px">${r.note}</div>` : ''}
      `).join('')}

      <div class="popup-section-title">✈️ Nearest International Airports</div>
      ${(c.airports || []).map(a => `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px;">
          <span style="background:${a.intl ? 'rgba(106,171,114,0.15)' : 'rgba(212,134,74,0.15)'};color:${a.intl ? '#4a8a52' : '#b86b2a'};padding:2px 8px;border-radius:4px;font-weight:600;font-size:11px;flex-shrink:0">${a.code}</span>
          <span style="color:#3d3529">${a.name}</span>
          <span style="color:#9e9486;margin-left:auto;flex-shrink:0">${a.dist}</span>
        </div>
      `).join('')}

      <div class="popup-section-title">🏡 House Architecture You'll See</div>
      <div class="house-styles">
        ${(c.houseStyles || []).map(s => `<span class="house-style-tag">${s}</span>`).join('')}
      </div>
      <div class="popup-section-title">📍 Best Neighborhoods</div>
      ${(c.neighborhoods || []).map(n => `
        <div class="neighborhood-card">
          <div class="neighborhood-name">${n.name}</div>
          <div class="neighborhood-desc">${n.desc}</div>
          <div class="neighborhood-price">${n.price}</div>
        </div>
      `).join('')}
      ${noteHtml}
    </div>
  `;
}

// Add markers
const markers = [];
cities.forEach((c, i) => {
  const size = getMarkerSize(c.sunny);
  const color = getSunColor(c.sunny);
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px;height:${size}px;border-radius:50%;
      background:${color};border:2px solid rgba(255,255,255,0.9);
      box-shadow:0 0 ${size}px ${color}44, 0 2px 8px rgba(100,80,50,0.3);
      display:flex;align-items:center;justify-content:center;
      font-size:${size*0.5}px;cursor:pointer;
      transition:transform 0.2s;
    " onmouseenter="this.style.transform='scale(1.3)'" onmouseleave="this.style.transform='scale(1)'">${c.emoji}</div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });

  const marker = L.marker([c.lat, c.lng], { icon }).addTo(map);
  marker.bindPopup(makePopup(c), { maxWidth: 360, maxHeight: 500 });
  markers.push(marker);

  // Sidebar
  const item = document.createElement('div');
  item.className = 'sidebar-item';
  item.innerHTML = `
    <div class="sidebar-dot" style="background:${color}"></div>
    <div>
      <span class="sidebar-name">${c.emoji} ${c.name}</span>
      <span class="sidebar-tag">${c.tag} · ${c.sunny}☀️ · ${c.home}</span>
    </div>
  `;
  item.onclick = () => {
    map.flyTo([c.lat, c.lng], 10, { duration: 1.2 });
    setTimeout(() => marker.openPopup(), 600);
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    item.classList.add('active');
  };
  document.getElementById('sidebar').appendChild(item);
});
</script>
</body>
</html>
